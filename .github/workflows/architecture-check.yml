name: Architecture Validation

on:
  push:
    branches: [main]
    paths:
      - 'architecture/**'
      - 'sample-app/**'
      - 'scripts/**'
      - '.github/workflows/architecture-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'architecture/**'
      - 'sample-app/**'
      - 'scripts/**'

jobs:
  validate-architecture:
    name: Validate Architecture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Validate Structurizr DSL
        working-directory: scripts
        run: node validate-dsl.js

      - name: Detect architecture drift
        working-directory: scripts
        run: node detect-drift.js

  generate-diagrams:
    name: Generate Diagrams
    runs-on: ubuntu-latest
    needs: validate-architecture
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (for Structurizr CLI)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Structurizr CLI
        run: |
          curl -L -o structurizr-cli.zip https://github.com/structurizr/cli/releases/download/v2024.01.02/structurizr-cli.zip
          unzip structurizr-cli.zip -d structurizr-cli

      - name: Export diagrams to PNG
        run: |
          ./structurizr-cli/structurizr.sh export \
            -workspace architecture/workspace.dsl \
            -format png \
            -output docs/diagrams

      - name: Export diagrams to SVG
        run: |
          ./structurizr-cli/structurizr.sh export \
            -workspace architecture/workspace.dsl \
            -format svg \
            -output docs/diagrams

      - name: Commit generated diagrams
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: auto-generate architecture diagrams [skip ci]'
          file_pattern: 'docs/diagrams/*'
          branch: main

  notify-drift:
    name: Notify on Drift
    runs-on: ubuntu-latest
    needs: validate-architecture
    if: failure()

    steps:
      - name: Create issue on drift detection
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Architecture Drift Detected';
            const body = `
            ## Architecture Drift Detected

            The architecture validation workflow has detected drift between the documented architecture and the actual codebase.

            **Workflow run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ### What to do:

            1. Review the workflow logs to see the specific drift issues
            2. Either:
               - Update the architecture documentation (\`architecture/workspace.dsl\`)
               - Or fix the code to match the documented architecture

            ### Common causes:
            - New service added but not documented
            - Service removed but still in documentation
            - Dependency changed but not reflected in docs

            ---
            *This issue was automatically created by the Architecture Validation workflow.*
            `;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'architecture-drift'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['architecture-drift', 'documentation']
              });
            }
